slug: default-sing-box
name: Default sing-box
client_type: sing-box
is_default: true
rule_sets:
  - default_rules
content: |
  {
    "log": {
      "level": "info",
      "timestamp": true
    },
    "experimental": {
      "cache_file": {
        "enabled": true
      }
    },
    "dns": {
      "servers": [
        {
          "tag": "bootstrap",
          "type": "udp",
          "server": "223.5.5.5"
        },
        {
          "tag": "alidns",
          "type": "https",
          "server": "dns.alidns.com",
          "domain_resolver": "bootstrap"
        },
        {
          "tag": "dnspod",
          "type": "https",
          "server": "doh.pub",
          "domain_resolver": "bootstrap"
        },
        {
          "tag": "cloudflare-gateway",
          "type": "https",
          "server": "v5brh3pn84.cloudflare-gateway.com",
          "domain_resolver": "bootstrap"
        },
        {
          "tag": "cloudflare",
          "type": "https",
          "server": "cloudflare-dns.com",
          "domain_resolver": "bootstrap"
        }
      ],
      "rules": [
        {
          "domain_suffix": [
            "lan",
            "local",
            "arpa"
          ],
          "action": "route",
          "server": "alidns"
        },
        {
          "rule_set": [
            "geosite-geolocation-cn"
          ],
          "action": "route",
          "server": "alidns"
        },
        {
          "rule_set": [
            "geosite-geolocation-!cn"
          ],
          "action": "route",
          "server": "cloudflare-gateway"
        }
      ],
      "final": "alidns",
      "strategy": "prefer_ipv4"
    },
    "inbounds": [
      {
        "type": "tun",
        "tag": "tun-in",
        "address": [
          "172.19.0.1/30",
          "fdfe:dcba:9876::1/126"
        ],
        "auto_route": true,
        "strict_route": true
      },
      {
        "type": "mixed",
        "tag": "mixed-in",
        "listen": "127.0.0.1",
        "listen_port": 7890
      }
    ],
    "outbounds":
      {{ outbounds }},
    "route": {
      "rule_set":
        {{ rule_sets }},
      "rules":
        {{ route_rules }},
      "final": {{ final_outbound }},
      "default_domain_resolver": "bootstrap",
      "auto_detect_interface": true
    }
  }
