slug: default-mihomo
name: Default mihomo
client_type: mihomo
is_default: true
rule_sets:
  - default_rules
content: |
  mixed-port: 7890
  allow-lan: true
  bind-address: '*'
  mode: rule
  log-level: info
  external-controller: 127.0.0.1:46011

  clash-for-android:
    append-system-dns: false

  sniffer:
    enable: true
    parse-pure-ip: true
    override-destination: false
    sniff:
      HTTP:
        ports:
        - 80
        - 8080-8880
        override-destination: true
      TLS:
        ports:
        - 443
        - 8443
      QUIC:
        ports:
        - 443
    force-domain:
    - +.claude.ai
    - +.claude.com
    - +.anthropic.com
    - +.claudeusercontent.com

  dns:
    enable: true
    listen: :53
    ipv6: false                    # No IPv6 egress; turn on only if you have one
    prefer-h3: false
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    fake-ip-filter-mode: blacklist
    fake-ip-filter:                # These return real IPs, bypassing fake-ip
    - '*.lan'
    - '*.local'
    - '*.arpa'
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - localhost.ptlogin2.qq.com
    - +.msftncsi.com
    - www.msftconnecttest.com

    use-hosts: false
    use-system-hosts: false
    respect-rules: false
    direct-nameserver: []
    direct-nameserver-follow-policy: false

    # Bootstrap: resolves the DoH hostnames below; must be plain IPs
    default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

    # Resolves proxy-node domains; must be bare-reachable domestic DoH,
    # otherwise you can't connect to the nodes in the first place
    proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

    # Fallback for domains not matched by any policy below; kept domestic
    # to avoid leaking long-tail/unknown lookups abroad
    nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

    # Per-domain split resolution. mihomo queries all servers in a list
    # concurrently and takes the fastest valid reply — so the primary is
    # used whenever healthy, and the backups seamlessly cover for it.
    nameserver-policy:
      # Domestic domains -> domestic DoH
      "geosite:cn,private,apple-cn,microsoft@cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
      # Foreign domains -> org Cloudflare Gateway (primary), public CF/Google as backup.
      # Bare resolution verified working on this line (TCP ping + full DoH Status:0).
      "geosite:geolocation-!cn":
      - https://v5brh3pn84.cloudflare-gateway.com/dns-query
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query

  proxies:
    {{ proxies }}

  proxy-groups:
    {{ proxy_groups }}

  rules:
    {{ rules_personal }}
    {{ rules_common }}
