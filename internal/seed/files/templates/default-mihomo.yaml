slug: default-mihomo
name: Default mihomo
client_type: mihomo
is_default: true
rule_sets:
  - default_rules
content: |
  mixed-port: 7890
  allow-lan: false
  bind-address: '*'
  mode: rule
  log-level: info
  external-controller: 127.0.0.1:46011

  clash-for-android:
    append-system-dns: false

  sniffer:
    enable: true
    parse-pure-ip: true
    override-destination: false
    sniff:
      HTTP:
        ports:
        - 80
        - 8080-8880
        override-destination: true
      TLS:
        ports:
        - 443
        - 8443
      QUIC:
        ports:
        - 443
    force-domain:
    - +.claude.ai
    - +.claude.com
    - +.anthropic.com
    - +.claudeusercontent.com

  dns:
    enable: true
    listen: :53
    ipv6: false                    # No IPv6 egress; turn on only if you have one
    prefer-h3: false
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    fake-ip-filter-mode: blacklist
    fake-ip-filter:                # These return real IPs, bypassing fake-ip
    - '*.lan'
    - '*.local'
    - '*.arpa'
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - localhost.ptlogin2.qq.com
    - +.msftncsi.com
    - www.msftconnecttest.com

    use-hosts: false
    use-system-hosts: false
    respect-rules: false
    direct-nameserver: []
    direct-nameserver-follow-policy: false

    # Bootstrap: resolves the DoH hostnames below. Entries must be IP-hosted
    # (plain IP, or encrypted DNS whose host is a literal IP). The domestic
    # pair answers first inside China; the Cloudflare DoH-by-IP is a poison-
    # resistant foreign fallback — its cert carries IP SANs so it validates
    # without skip-cert-verify; blocked in CN (concurrent query, domestic wins,
    # no added latency), used when running abroad. NB: 8.8.8.8-by-IP would NOT
    # work here (Google's cert is dns.google-only, no IP SAN) — Cloudflare only.
    default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://1.1.1.1/dns-query

    # Resolves proxy-node domains; must be bare-reachable domestic DoH,
    # otherwise you can't connect to the nodes in the first place
    proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

    # Fallback for domains not matched by any policy below; kept domestic
    # to avoid leaking long-tail/unknown lookups abroad
    nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

    # Per-domain split resolution. mihomo queries all servers in a list
    # concurrently and takes the fastest valid reply — so the primary is
    # used whenever healthy, and the backups seamlessly cover for it.
    nameserver-policy:
      # Private / LAN / mDNS -> the OS (system) resolver. geosite:private
      # contains lan / local / localhost / *.arpa / internal — names a public
      # DoH cannot resolve, so routing them to a domestic DoH (as this template
      # used to, by folding `private` into the key below) made .lan / .local /
      # NAS / intranet lookups fail. The system resolver knows the router's
      # local names and .local mDNS. (.lan/.local/*.arpa are also in
      # fake-ip-filter above, so they already get a real IP, not a fake one.)
      "geosite:private":
      - system
      # Domestic domains -> domestic DoH
      "geosite:cn,apple-cn,microsoft@cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
      # Foreign domains -> org Cloudflare Gateway (primary; bare resolution
      # verified working — TCP ping + full DoH Status:0), public Cloudflare
      # 1.1.1.1 / 1.0.0.1 as backup. The CF IPs carry IP SANs so DoH-by-IP
      # validates cleanly; Google 8.8.8.8-by-IP is NOT used (its cert is
      # dns.google-only, no IP SAN -> would fail certificate validation).
      "geosite:geolocation-!cn":
      - https://v5brh3pn84.cloudflare-gateway.com/dns-query
      - https://1.1.1.1/dns-query
      - https://1.0.0.1/dns-query

  proxies:
    {{ proxies }}

  proxy-groups:
    {{ proxy_groups }}

  rules:
    # Web QUIC (HTTP/3 over UDP 443): built-in REJECT so browsers fall back to
    # h2/TCP. Highest priority — runs before 🎮 UDP控制 and the routing rules
    # below. QUIC on a poor-UDP node makes YouTube/Google laggy; TCP is reliable
    # on every node. Only drops the QUIC attempt — the TCP fallback still follows
    # the rules below (not a direct leak), and proxy-node dials bypass the rule
    # engine so Hysteria2 nodes are unaffected.
    - AND,((NETWORK,udp),(DST-PORT,443)),REJECT
    {{ rules_personal }}
    {{ rules_common }}
