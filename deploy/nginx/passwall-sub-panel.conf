# Sample Nginx reverse proxy for Passwall-Sub-Panel.
# Drop into /etc/nginx/conf.d/ (or sites-available/) and reload.

upstream psp_backend {
    server 127.0.0.1:8788;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name sub.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sub.example.com;

    # Replace with paths to your real cert/key, e.g. from certbot.
    ssl_certificate     /etc/letsencrypt/live/sub.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sub.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Reasonable client body limit; SAML POST + admin actions are tiny.
    client_max_body_size 1m;

    # Anything (admin SPA, /api, /sub, SAML ACS) goes to the panel.
    location / {
        proxy_pass http://psp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }
}
