name: Test

# Runs the Go test suite, the SPA type/build check, and a cross-platform compile
# check. The build job cross-compiles the deployable binary for every release
# GOOS/GOARCH (CGO off, pure Go) so a platform-specific build break is caught
# here on push/PR instead of only when a release tag is cut. All three Go test
# jobs run the WHOLE suite (go test ./...); the postgres and mysql jobs additionally
# set PSP_TEST_DB_KIND / PSP_TEST_DB_DSN so internal/adapters/sqlstore/testdb_test.go
# points the DB-adapter tests (schema + every repo + the grouped / scoped-settings
# layer) at a real server, giving each test its own database on the shared
# service container, to verify cross-dialect behaviour that SQLite alone can't.
# Packages outside sqlstore don't read those env vars, so they still run against
# whatever DB (usually an in-process SQLite) their own test setup uses — see the
# note on internal/service/rollup/rollup_test.go if that ever needs cross-dialect
# coverage too. Each Go job uploads its test output as an artifact on failure for
# diagnosis.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web-react/package-lock.json
      - name: Install dependencies
        working-directory: web-react
        run: npm ci
      - name: build
        working-directory: web-react
        run: npm run build

  build:
    name: build (cross-compile release targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Cross-compile the deployable binary for every release GOOS/GOARCH. The
      # binary is pure Go (CGO_ENABLED=0), so this is fast and needs no C
      # toolchains. The committed internal/web/dist/.gitkeep satisfies
      # //go:embed all:dist, so no SPA build is required just to confirm the Go
      # binary links — the web job covers the SPA build separately. Output is
      # discarded (-o /dev/null); we only care that every target compiles.
      - name: cross-compile ./cmd/panel
        run: |
          set -uo pipefail
          fail=0
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            if GOOS="${target%/*}" GOARCH="${target#*/}" CGO_ENABLED=0 \
                 go build -trimpath -ldflags="-s -w" -o /dev/null ./cmd/panel; then
              echo "✓ ${target}"
            else
              echo "✗ ${target}"
              fail=1
            fi
          done
          exit "$fail"

  sqlite:
    name: sqlite (full suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - name: test
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee test-output.txt
      - name: upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-test-output
          path: test-output.txt

  postgres:
    name: postgres (full suite)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: psp
          POSTGRES_PASSWORD: psp
          POSTGRES_DB: psptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psp -d psptest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PSP_TEST_DB_KIND: postgres
      PSP_TEST_DB_DSN: postgres://psp:psp@localhost:5432/psptest?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: test
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee test-output.txt
      - name: upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-test-output
          path: test-output.txt

  mysql:
    name: mysql (full suite)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: psp
          MYSQL_DATABASE: psptest
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -ppsp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      PSP_TEST_DB_KIND: mysql
      # {schema} is substituted with a per-test database name by openTestDB.
      PSP_TEST_DB_DSN: root:psp@tcp(127.0.0.1:3306)/{schema}?parseTime=true&multiStatements=true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: test
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee test-output.txt
      - name: upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-test-output
          path: test-output.txt
