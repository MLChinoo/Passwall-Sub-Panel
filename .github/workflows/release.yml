name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.mod

      - name: Build web assets
        working-directory: web
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Download Go modules
        run: go mod download

      - name: Build release archives
        shell: bash
        env:
          VERSION: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail

          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            name="passwall-sub-panel_${VERSION}_${goos}_${goarch}"
            outdir="build/${name}"
            mkdir -p "$outdir"

            ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "${outdir}/panel${ext}" ./cmd/panel
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "${outdir}/psp-cli${ext}" ./cmd/cli

            cp README.md "$outdir/" 2>/dev/null || true
            cp config/config.yaml.example "$outdir/" 2>/dev/null || true
            mkdir -p "$outdir/config"
            cp -R config/templates "$outdir/config/" 2>/dev/null || true

            if [ "$goos" = "windows" ]; then
              (cd build && zip -qr "../dist/${name}.zip" "$name")
            else
              tar -C build -czf "dist/${name}.tar.gz" "$name"
            fi
          done

          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
